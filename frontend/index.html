<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="MoodScribe — AI-powered emotional journaling. Track your feelings, detect emotions, and discover patterns in your emotional journey.">
    <title>MoodScribe — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="auth-page">

    <!-- Animated Background Orbs -->
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <!-- Brand Header -->
            <div class="auth-brand">
                <div class="brand-icon">
                    <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                        <circle cx="20" cy="20" r="18" stroke="url(#grad1)" stroke-width="2.5" fill="none" />
                        <path d="M13 22c0 0 2.5 5 7 5s7-5 7-5" stroke="url(#grad1)" stroke-width="2"
                            stroke-linecap="round" />
                        <circle cx="15" cy="16" r="1.5" fill="#6366F1" />
                        <circle cx="25" cy="16" r="1.5" fill="#6366F1" />
                        <defs>
                            <linearGradient id="grad1" x1="0" y1="0" x2="40" y2="40">
                                <stop offset="0%" stop-color="#6366F1" />
                                <stop offset="100%" stop-color="#EC4899" />
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <h1 class="brand-name">MoodScribe</h1>
                <p class="brand-tagline">Your AI-powered emotional journal</p>
            </div>

            <!-- Auth Form -->
            <form id="authForm" class="auth-form" autocomplete="off">
                <h2 id="authTitle" class="auth-title">Welcome Back</h2>

                <div class="input-group">
                    <label for="email">Email</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <rect x="2" y="4" width="20" height="16" rx="3" />
                            <path d="m2 7 10 6 10-6" />
                        </svg>
                        <input type="email" id="email" placeholder="you@example.com" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <rect x="5" y="11" width="14" height="10" rx="2" />
                            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                        </svg>
                        <input type="password" id="password" placeholder="••••••••" required minlength="6" style="padding-right: 44px;">
                        <button type="button" class="btn-toggle-password" onclick="togglePassword()" title="Show password">
                            <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" id="authBtn" class="btn btn-primary btn-full">
                    <span class="btn-text">Sign In</span>
                    <div class="btn-spinner" style="display:none"></div>
                </button>

                <p class="auth-switch">
                    <span id="switchText">Don't have an account?</span>
                    <a href="#" id="switchLink" onclick="toggleAuthMode(event)">Sign Up</a>
                </p>
            </form>

            <!-- Error/Success Messages -->
            <div id="authMessage" class="auth-message" style="display:none"></div>
        </div>
    </div>

    <!-- Supabase JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="script.js"></script>
    <script>
        // ─── Auth Page Logic ────────────────────────────────────────
        let isLogin = true;

        function toggleAuthMode(e) {
            e.preventDefault();
            isLogin = !isLogin;
            document.getElementById("authTitle").textContent = isLogin ? "Welcome Back" : "Create Account";
            document.getElementById("authBtn").querySelector(".btn-text").textContent = isLogin ? "Sign In" : "Sign Up";
            document.getElementById("switchText").textContent = isLogin ? "Don't have an account?" : "Already have an account?";
            document.getElementById("switchLink").textContent = isLogin ? "Sign Up" : "Sign In";
            hideMessage();
        }

        function togglePassword() {
            const pwd = document.getElementById("password");
            const eye = document.getElementById("eyeIcon");
            if (pwd.type === "password") {
                pwd.type = "text";
                eye.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`;
            } else {
                pwd.type = "password";
                eye.innerHTML = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" /><circle cx="12" cy="12" r="3" />`;
            }
        }

        function showMessage(text, type = "error") {
            const el = document.getElementById("authMessage");
            el.textContent = text;
            el.className = "auth-message " + type;
            el.style.display = "block";
        }

        function hideMessage() {
            document.getElementById("authMessage").style.display = "none";
        }

        document.getElementById("authForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            hideMessage();

            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const btn = document.getElementById("authBtn");
            const spinner = btn.querySelector(".btn-spinner");
            const btnText = btn.querySelector(".btn-text");

            btnText.style.display = "none";
            spinner.style.display = "inline-block";
            btn.disabled = true;

            try {
                if (isLogin) {
                    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    showMessage("Login successful! Redirecting…", "success");
                    setTimeout(() => window.location.href = "dashboard.html", 800);
                } else {
                    const { data, error } = await supabaseClient.auth.signUp({ email, password });
                    if (error) throw error;
                    // Auto sign-in after signup (no email confirmation needed)
                    const { data: loginData, error: loginError } = await supabaseClient.auth.signInWithPassword({ email, password });
                    if (loginError) throw loginError;
                    showMessage("Account created! Redirecting…", "success");
                    setTimeout(() => window.location.href = "dashboard.html", 800);
                }
            } catch (err) {
                showMessage(err.message || "Authentication failed.");
            } finally {
                btnText.style.display = "inline";
                spinner.style.display = "none";
                btn.disabled = false;
            }
        });

        // If already logged in, redirect
        (async () => {
            const { data } = await supabaseClient.auth.getSession();
            if (data.session) window.location.href = "dashboard.html";
        })();
    </script>
</body>

</html>
