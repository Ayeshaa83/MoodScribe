<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View your emotional journey — charts, insights, and mood trends powered by AI.">
    <title>MoodScribe — Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>

<body class="app-page">

    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-brand" onclick="window.location.href='journal.html'">
            <div class="brand-icon-sm">
                <svg width="28" height="28" viewBox="0 0 40 40" fill="none">
                    <circle cx="20" cy="20" r="18" stroke="url(#navGrad)" stroke-width="2.5" fill="none" />
                    <path d="M13 22c0 0 2.5 5 7 5s7-5 7-5" stroke="url(#navGrad)" stroke-width="2"
                        stroke-linecap="round" />
                    <circle cx="15" cy="16" r="1.5" fill="#6366F1" />
                    <circle cx="25" cy="16" r="1.5" fill="#6366F1" />
                    <defs>
                        <linearGradient id="navGrad" x1="0" y1="0" x2="40" y2="40">
                            <stop offset="0%" stop-color="#6366F1" />
                            <stop offset="100%" stop-color="#EC4899" />
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <span class="nav-title">MoodScribe</span>
        </div>
        <div class="nav-links">
            <a href="journal.html" class="nav-link" id="navJournal">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 20h9" />
                    <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
                </svg>
                Journal
            </a>
            <a href="dashboard.html" class="nav-link active" id="navDashboard">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="7" height="7" rx="1" />
                    <rect x="14" y="3" width="7" height="7" rx="1" />
                    <rect x="3" y="14" width="7" height="7" rx="1" />
                    <rect x="14" y="14" width="7" height="7" rx="1" />
                </svg>
                Dashboard
            </a>
            <button class="nav-link btn-logout" onclick="logout()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                    <polyline points="16 17 21 12 16 7" />
                    <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
                Logout
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="dashboard-main">
        <div class="dashboard-container">
            <!-- Header -->
            <div class="dash-header fade-in">
                <h1>Your Emotional Journey</h1>
                <p class="dash-subtitle" id="dashSubtitle">Loading your data…</p>
            </div>

            <!-- Stats Row -->
            <div class="stats-row fade-in delay-1" id="statsRow">
                <div class="stat-card" id="statTotal">
                    <div class="stat-icon">📝</div>
                    <div class="stat-value" id="totalEntries">—</div>
                    <div class="stat-label">Total Entries</div>
                </div>
                <div class="stat-card" id="statFrequent">
                    <div class="stat-icon" id="freqEmoji">🔮</div>
                    <div class="stat-value" id="freqEmotion">—</div>
                    <div class="stat-label">Most Frequent</div>
                </div>
                <div class="stat-card" id="statStreak">
                    <div class="stat-icon">🔥</div>
                    <div class="stat-value" id="streakValue">—</div>
                    <div class="stat-label" id="streakLabel">Mood Streak</div>
                </div>
                <div class="stat-card" id="statEmotional">
                    <div class="stat-icon">⚡</div>
                    <div class="stat-value" id="emotionalDay">—</div>
                    <div class="stat-label">Most Emotional Day</div>
                </div>
            </div>

            <!-- Insight Banner -->
            <div class="insight-banner fade-in delay-2" id="insightBanner" style="display:none">
                <div class="insight-icon">💡</div>
                <p class="insight-text" id="insightText"></p>
            </div>

            <!-- Charts Row -->
            <div class="charts-row fade-in delay-2">
                <div class="chart-card">
                    <h3 class="chart-title">Emotion Distribution</h3>
                    <div class="chart-wrapper">
                        <canvas id="emotionPieChart"></canvas>
                    </div>
                </div>
                <div class="chart-card">
                    <h3 class="chart-title">Mood Timeline</h3>
                    <div class="chart-wrapper chart-wrapper-wide">
                        <canvas id="moodTimelineChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- Entry History -->
            <div class="history-section fade-in delay-3">
                <h3 class="section-title">Journal History</h3>
                <div class="entry-list" id="entryList">
                    <div class="empty-state" id="emptyState">
                        <div class="empty-icon">📖</div>
                        <p>No journal entries yet.</p>
                        <a href="journal.html" class="btn btn-primary btn-sm">Write Your First Entry</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Journal Entry Modal -->
    <div class="modal-overlay" id="entryModal">
        <div class="modal-card">
            <button class="modal-close" id="modalClose" title="Close">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
            <div class="modal-header">
                <span class="modal-emoji" id="modalEmoji"></span>
                <div>
                    <div class="modal-emotion" id="modalEmotion"></div>
                    <div class="modal-date" id="modalDate"></div>
                </div>
            </div>
            <div class="modal-confidence">
                <div class="confidence-label">
                    <span>Confidence</span>
                    <span class="confidence-value" id="modalConf"></span>
                </div>
                <div class="confidence-bar">
                    <div class="confidence-fill" id="modalConfFill"></div>
                </div>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer">
                <button class="btn btn-outline btn-sm" id="modalDeleteBtn">🗑️ Delete Entry</button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="script.js"></script>
    <script>
        let pieChart = null;
        let timelineChart = null;
        let allEntries = [];  // store for modal access

        // ─── Auth Guard ─────────────────────────────────────────────
        (async () => {
            const { data } = await supabaseClient.auth.getSession();
            if (!data.session) {
                window.location.href = "index.html";
                return;
            }
            loadDashboard();
        })();

        // ─── Load Dashboard ────────────────────────────────────────
        async function loadDashboard() {
            try {
                const { data: { session } } = await supabaseClient.auth.getSession();
                const headers = {
                    "Authorization": "Bearer " + session.access_token,
                };

                // Fetch entries and insights in parallel
                const [entriesRes, insightsRes] = await Promise.all([
                    fetch("/api/entries?user_id=" + session.user.id, { headers }),
                    fetch("/api/insights?user_id=" + session.user.id, { headers }),
                ]);

                const entries = await entriesRes.json();
                const insights = await insightsRes.json();

                renderStats(insights);
                renderInsight(insights);
                renderPieChart(insights.emotion_distribution);
                renderTimeline(entries);
                allEntries = entries;
                renderEntries(entries);

                document.getElementById("dashSubtitle").textContent =
                    insights.total_entries > 0
                        ? `${insights.total_entries} entries · Tracking since ${entries[entries.length - 1]?.created_at?.slice(0, 10) || "today"}`
                        : "Start journaling to see your emotional patterns!";

            } catch (err) {
                showToast("Failed to load dashboard: " + err.message, "error");
            }
        }

        // ─── Render Stats ───────────────────────────────────────────
        function renderStats(insights) {
            document.getElementById("totalEntries").textContent = insights.total_entries || 0;

            if (insights.most_frequent_emotion) {
                const em = insights.most_frequent_emotion;
                document.getElementById("freqEmoji").textContent = EMOTION_EMOJIS[em] || "🔮";
                document.getElementById("freqEmotion").textContent = em.charAt(0).toUpperCase() + em.slice(1);
            }

            if (insights.streak && insights.streak.days > 0) {
                document.getElementById("streakValue").textContent = insights.streak.days + " day" + (insights.streak.days !== 1 ? "s" : "");
                document.getElementById("streakLabel").textContent =
                    (insights.streak.type === "positive" ? "Positive" : "Negative") + " Streak";
            }

            if (insights.most_emotional_day) {
                const d = new Date(insights.most_emotional_day);
                document.getElementById("emotionalDay").textContent = d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
            }
        }

        // ─── Render Insight Banner ──────────────────────────────────
        function renderInsight(insights) {
            if (insights.weekly_summary) {
                const banner = document.getElementById("insightBanner");
                document.getElementById("insightText").textContent = insights.weekly_summary;
                banner.style.display = "flex";
            }
        }

        // ─── Pie Chart ─────────────────────────────────────────────
        function renderPieChart(distribution) {
            if (!distribution || Object.keys(distribution).length === 0) return;

            const labels = Object.keys(distribution).map(e => e.charAt(0).toUpperCase() + e.slice(1));
            const data = Object.values(distribution);
            const colors = Object.keys(distribution).map(e => EMOTION_COLORS[e] || "#94A3B8");

            const ctx = document.getElementById("emotionPieChart").getContext("2d");
            if (pieChart) pieChart.destroy();

            pieChart = new Chart(ctx, {
                type: "doughnut",
                data: {
                    labels,
                    datasets: [{
                        data,
                        backgroundColor: colors,
                        borderColor: "#ffffff",
                        borderWidth: 3,
                        hoverOffset: 8,
                    }],
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: "60%",
                    plugins: {
                        legend: {
                            position: "bottom",
                            labels: {
                                padding: 16,
                                font: { family: "Inter", size: 13 },
                                usePointStyle: true,
                                pointStyleWidth: 10,
                            },
                        },
                    },
                },
            });
        }

        // ─── Timeline Chart ────────────────────────────────────────
        function renderTimeline(entries) {
            if (!entries || entries.length === 0) return;

            // Reverse for chronological order
            const reversed = [...entries].reverse();
            const emotionToNum = { sadness: 1, fear: 2, anger: 3, surprise: 4, love: 5, joy: 6 };

            const labels = reversed.map(e => {
                const d = new Date(e.created_at);
                return d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
            });
            const data = reversed.map(e => emotionToNum[e.emotion] || 0);
            const colors = reversed.map(e => EMOTION_COLORS[e.emotion] || "#94A3B8");

            const ctx = document.getElementById("moodTimelineChart").getContext("2d");
            if (timelineChart) timelineChart.destroy();

            timelineChart = new Chart(ctx, {
                type: "line",
                data: {
                    labels,
                    datasets: [{
                        label: "Mood Level",
                        data,
                        borderColor: "#6366F1",
                        backgroundColor: "rgba(99, 102, 241, 0.1)",
                        fill: true,
                        tension: 0.4,
                        pointRadius: 6,
                        pointBackgroundColor: colors,
                        pointBorderColor: "#fff",
                        pointBorderWidth: 2,
                        pointHoverRadius: 9,
                    }],
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            min: 0,
                            max: 7,
                            ticks: {
                                stepSize: 1,
                                callback: (val) => {
                                    const map = { 1: "😢", 2: "😨", 3: "😠", 4: "😲", 5: "❤️", 6: "😊" };
                                    return map[val] || "";
                                },
                                font: { size: 16 },
                            },
                            grid: { color: "rgba(0,0,0,0.05)" },
                        },
                        x: {
                            grid: { display: false },
                            ticks: { font: { family: "Inter", size: 11 } },
                        },
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: (ctx) => {
                                    const entry = reversed[ctx.dataIndex];
                                    return `${EMOTION_EMOJIS[entry.emotion]} ${entry.emotion} (${Math.round(entry.confidence * 100)}%)`;
                                },
                            },
                        },
                    },
                },
            });
        }

        // ─── Render Entries ─────────────────────────────────────────
        function renderEntries(entries) {
            const list = document.getElementById("entryList");
            const empty = document.getElementById("emptyState");

            if (!entries || entries.length === 0) {
                empty.style.display = "flex";
                return;
            }
            empty.style.display = "none";

            entries.forEach(entry => {
                const div = document.createElement("div");
                div.className = "entry-item entry-clickable";
                div.id = "entry-" + entry.id;

                const date = new Date(entry.created_at);
                const dateStr = date.toLocaleDateString("en-US", {
                    weekday: "short", month: "short", day: "numeric", hour: "2-digit", minute: "2-digit"
                });

                const preview = entry.text.length > 150 ? entry.text.substring(0, 150) + "…" : entry.text;
                const conf = Math.round(entry.confidence * 100);

                div.innerHTML = `
                    <div class="entry-top">
                        <span class="entry-emotion-badge emotion-bg-${entry.emotion}">
                            ${EMOTION_EMOJIS[entry.emotion] || "🔮"} ${entry.emotion}
                        </span>
                        <div class="entry-actions">
                            <span class="entry-date">${dateStr}</span>
                            <button class="btn-delete" onclick="event.stopPropagation(); deleteEntry('${entry.id}')" title="Delete entry">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="3 6 5 6 21 6"/>
                                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                                    <line x1="10" y1="11" x2="10" y2="17"/>
                                    <line x1="14" y1="11" x2="14" y2="17"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <p class="entry-preview">${preview}</p>
                    <div class="entry-confidence">
                        <div class="mini-bar"><div class="mini-fill emotion-bg-${entry.emotion}" style="width:${conf}%"></div></div>
                        <span class="mini-label">${conf}% confidence</span>
                    </div>
                `;

                // Click to open modal (not on delete button)
                div.addEventListener("click", () => openEntryModal(entry.id));
                list.appendChild(div);
            });
        }

        // ─── Entry Modal ────────────────────────────────────────────
        function openEntryModal(entryId) {
            const entry = allEntries.find(e => e.id === entryId);
            if (!entry) return;

            const modal = document.getElementById("entryModal");
            const date = new Date(entry.created_at);
            const dateStr = date.toLocaleDateString("en-US", {
                weekday: "long", year: "numeric", month: "long", day: "numeric",
                hour: "2-digit", minute: "2-digit"
            });
            const conf = Math.round(entry.confidence * 100);
            const emotionColor = EMOTION_COLORS[entry.emotion] || "#94A3B8";

            document.getElementById("modalEmoji").textContent = EMOTION_EMOJIS[entry.emotion] || "🔮";
            document.getElementById("modalEmotion").textContent = entry.emotion.charAt(0).toUpperCase() + entry.emotion.slice(1);
            document.getElementById("modalDate").textContent = dateStr;
            document.getElementById("modalConf").textContent = conf + "%";
            document.getElementById("modalBody").textContent = entry.text;

            const fill = document.getElementById("modalConfFill");
            fill.style.width = conf + "%";
            fill.style.background = emotionColor;

            // Wire delete button
            const delBtn = document.getElementById("modalDeleteBtn");
            delBtn.onclick = () => { closeEntryModal(); deleteEntry(entry.id); };

            modal.classList.add("active");
            document.body.style.overflow = "hidden";
        }

        function closeEntryModal() {
            document.getElementById("entryModal").classList.remove("active");
            document.body.style.overflow = "";
        }

        // Close modal on backdrop click, X button, Escape key
        document.getElementById("modalClose").addEventListener("click", closeEntryModal);
        document.getElementById("entryModal").addEventListener("click", (e) => {
            if (e.target === e.currentTarget) closeEntryModal();
        });
        document.addEventListener("keydown", (e) => {
            if (e.key === "Escape") closeEntryModal();
        });

        // ─── Delete Entry ───────────────────────────────────────────
        async function deleteEntry(entryId) {
            if (!confirm("Are you sure you want to delete this entry? This cannot be undone.")) return;

            try {
                const { data: { session } } = await supabaseClient.auth.getSession();
                const response = await fetch(`/api/entries/${entryId}?user_id=${session.user.id}`, {
                    method: "DELETE",
                    headers: { "Authorization": "Bearer " + session.access_token },
                });

                const result = await response.json();
                if (!response.ok) throw new Error(result.error || "Delete failed");

                // Animate removal
                const el = document.getElementById("entry-" + entryId);
                if (el) {
                    el.style.transition = "all 0.3s ease";
                    el.style.opacity = "0";
                    el.style.transform = "translateX(50px)";
                    setTimeout(() => el.remove(), 300);
                }

                showToast("Entry deleted successfully", "success");

                // Reload dashboard after a brief delay
                setTimeout(() => loadDashboard(), 500);
            } catch (err) {
                showToast("Failed to delete: " + err.message, "error");
            }
        }
    </script>
    <style>
        /* ─── Entry Modal ──────────────────────────── */
        .entry-clickable { cursor: pointer; }
        .entry-clickable:hover {
            border-color: var(--primary-light) !important;
            transform: translateY(-2px);
            box-shadow: var(--shadow-md) !important;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            align-items: center;
            justify-content: center;
            padding: 24px;
            animation: fadeIn 0.2s ease;
        }
        .modal-overlay.active { display: flex; }

        .modal-card {
            position: relative;
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-lg), 0 25px 60px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 600px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.92) translateY(20px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg-subtle);
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            z-index: 2;
        }
        .modal-close:hover {
            background: #FEF2F2;
            border-color: #FECACA;
            color: #DC2626;
        }

        .modal-header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 28px 28px 0;
        }

        .modal-emoji {
            font-size: 2.8rem;
            line-height: 1;
        }

        .modal-emotion {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text);
        }

        .modal-date {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .modal-confidence {
            padding: 20px 28px 0;
        }

        .modal-body {
            padding: 20px 28px;
            font-size: 1rem;
            line-height: 1.8;
            color: var(--text);
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            flex: 1;
        }

        .modal-footer {
            padding: 0 28px 24px;
            display: flex;
            justify-content: flex-end;
        }
    </style>
</body>

</html>
