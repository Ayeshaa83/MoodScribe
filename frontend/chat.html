<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Talk to MoodScribe AI — An emotion-aware chatbot designed to support your mental journey.">
    <title>MoodScribe — Chat Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="app-page">

    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-brand" onclick="window.location.href='dashboard.html'">
            <div class="brand-icon-sm">
                <svg width="28" height="28" viewBox="0 0 40 40" fill="none">

                    <path d="M13 22c0 0 2.5 5 7 5s7-5 7-5" stroke="url(#navGrad)" stroke-width="2"
                        stroke-linecap="round" />
                    <circle cx="15" cy="16" r="1.5" fill="#6366F1" />
                    <circle cx="25" cy="16" r="1.5" fill="#6366F1" />
                    <defs>
                        <linearGradient id="navGrad" x1="0" y1="0" x2="40" y2="40">
                            <stop offset="0%" stop-color="#6366F1" />
                            <stop offset="100%" stop-color="#EC4899" />
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <span class="nav-title">MoodScribe</span>
        </div>
        <div class="nav-links">
            <a href="journal.html" class="nav-link" id="navJournal">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 20h9" />
                    <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
                </svg>
                Journal
            </a>
            <a href="dashboard.html" class="nav-link" id="navDashboard">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="7" height="7" rx="1" />
                    <rect x="14" y="3" width="7" height="7" rx="1" />
                    <rect x="3" y="14" width="7" height="7" rx="1" />
                    <rect x="14" y="14" width="7" height="7" rx="1" />
                </svg>
                Dashboard
            </a>
            <a href="chat.html" class="nav-link active" id="navChat">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                </svg>
                Chat
            </a>
            <button class="nav-link btn-logout" onclick="logout()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                    <polyline points="16 17 21 12 16 7" />
                    <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
                Logout
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="chat-main">
        <div class="chat-container">
            <!-- Header -->
            <div class="chat-header fade-in">
                <h1>AI Companion</h1>
                <p class="chat-subtitle">I'm here to listen and talk. How are you feeling right now?</p>
            </div>

            <!-- Chat Window -->
            <div class="chat-window fade-in delay-1">
                <div class="chat-messages" id="chatMessages">
                    <!-- Messages will be injected here -->
                    <div class="message bot-message">
                        <div class="message-content">
                            Hello! I'm your MoodScribe AI companion. I'm aware of your emotions and here to support you.
                        </div>
                    </div>
                </div>

                <div class="chat-input-area">
                    <form id="chatForm" class="chat-form">
                        <input type="text" id="chatInput" placeholder="Type your message..." autocomplete="off">
                        <button type="submit" class="btn btn-primary btn-round">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="22" y1="2" x2="11" y2="13" />
                                <polygon points="22 2 15 22 11 13 2 9 22 2" />
                            </svg>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="script.js"></script>
    <script>
        const chatMessages = document.getElementById("chatMessages");
        const chatForm = document.getElementById("chatForm");
        const chatInput = document.getElementById("chatInput");
        const micBtn = document.getElementById("micBtn");

        // ─── Auth Guard & Init ─────────────────────────────────────────
        (async () => {
            const { data } = await supabaseClient.auth.getSession();
            if (!data.session) {
                window.location.href = "index.html";
                return;
            }
            loadChatHistory();
        })();

        // ─── Load History ─────────────────────────────────────────────
        async function loadChatHistory() {
            try {
                const { data: { session } } = await supabaseClient.auth.getSession();
                const headers = { "Authorization": "Bearer " + session.access_token };
                const res = await fetch("/api/chat/history?user_id=" + session.user.id, { headers });
                const history = await res.json();

                if (history && history.length > 0) {
                    chatMessages.innerHTML = ""; // Clear initial message
                    history.forEach(item => {
                        appendMessage("user", item.message);
                        appendMessage("bot", item.reply, item.emotion);
                    });
                    scrollToBottom();
                }
            } catch (err) {
                console.error("Failed to load history:", err);
            }
        }

        // ─── Chat Submission ──────────────────────────────────────────
        chatForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            const message = chatInput.value.trim();
            if (!message) return;

            // Add user message to UI
            appendMessage("user", message);
            chatInput.value = "";
            scrollToBottom();

            // Add loading bot message
            const loadingMsg = appendMessage("bot", "...", null, true);

            try {
                const { data: { session } } = await supabaseClient.auth.getSession();
                const res = await fetch("/api/chat", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + session.access_token
                    },
                    body: JSON.stringify({
                        message,
                        user_id: session.user.id
                    })
                });

                const data = await res.json();
                if (res.ok) {
                    loadingMsg.remove();
                    appendMessage("bot", data.reply, data.emotion);
                } else {
                    throw new Error(data.error || "Chat failed");
                }
            } catch (err) {
                loadingMsg.remove();
                appendMessage("bot", "Sorry, I'm having trouble connecting right now.");
                showToast(err.message, "error");
            }
            scrollToBottom();
        });

        // ─── Helper: Append Message ────────────────────────────────────
        function appendMessage(sender, text, emotion = null, isLoading = false) {
            const div = document.createElement("div");
            div.className = `message ${sender}-message ${isLoading ? 'loading' : ''}`;
            
            let emotionBadge = "";
            if (emotion) {
                const emoji = EMOTION_EMOJIS[emotion] || "🔮";
                emotionBadge = `<span class="msg-emotion msg-emotion-${emotion}">${emoji} ${emotion}</span>`;
            }

            div.innerHTML = `
                <div class="message-content">
                    ${text}
                </div>
                ${emotionBadge}
            `;
            chatMessages.appendChild(div);
            return div;
        }

        function scrollToBottom() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
    </script>

    <style>
        /* Chat specific layout */
        .chat-main {
            padding: 80px 24px 24px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .chat-header {
            text-align: center;
        }

        .chat-header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #6366f1 0%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .chat-subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
        }

        .chat-window {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            height: 600px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-messages {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: rgba(255,255,255,0.3);
        }

        .message {
            max-width: 80%;
            display: flex;
            flex-direction: column;
            gap: 4px;
            animation: messagePop 0.3s ease;
        }

        @keyframes messagePop {
            from { opacity: 0; transform: translateY(10px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .user-message {
            align-self: flex-end;
            align-items: flex-end;
        }

        .bot-message {
            align-self: flex-start;
            align-items: flex-start;
        }

        .message-content {
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            position: relative;
        }

        .user-message .message-content {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.2);
        }

        .bot-message .message-content {
            background: white;
            color: var(--text);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .msg-emotion {
            font-size: 0.75rem;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 10px;
            margin-top: 4px;
        }

        .msg-emotion-sadness { background: #E0F2FE; color: #0369A1; }
        .msg-emotion-joy { background: #FEF9C3; color: #A16207; }
        .msg-emotion-love { background: #FCE7F3; color: #BE185D; }
        .msg-emotion-anger { background: #FEE2E2; color: #B91C1C; }
        .msg-emotion-fear { background: #F3E8FF; color: #7E22CE; }
        .msg-emotion-surprise { background: #ECFEFF; color: #0E7490; }

        .chat-input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-form {
            flex: 1;
            display: flex;
            gap: 10px;
        }

        #chatInput {
            flex: 1;
            padding: 12px 20px;
            border: 1px solid var(--border);
            border-radius: 25px;
            font-size: 0.95rem;
            transition: var(--transition);
            background: var(--bg-subtle);
        }

        #chatInput:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .btn-round {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            flex-shrink: 0;
        }

        .btn-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-subtle);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-icon:hover {
            background: var(--primary-light);
            color: var(--primary);
            border-color: var(--primary-light);
        }

        .btn-icon.recording {
            background: #FEE2E2;
            color: #DC2626;
            border-color: #FECACA;
            animation: pulseRecord 1.5s infinite;
        }

        @keyframes pulseRecord {
            0% { box-shadow: 0 0 0 0px rgba(220, 38, 38, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(220, 38, 38, 0); }
            100% { box-shadow: 0 0 0 0px rgba(220, 38, 38, 0); }
        }

        .loading .message-content::after {
            content: "";
            display: inline-block;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: currentColor;
            margin-left: 4px;
            box-shadow: 6px 0 currentColor, 12px 0 currentColor;
            animation: dots 1.5s infinite;
        }

        @keyframes dots {
            0%, 20% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</body>

</html>
